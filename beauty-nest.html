<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Nest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

/* ─── CSS Variables ─── */
:root {
  --bg: #fdf6f0;
  --bg2: #fff;
  --surface: #fff;
  --surface2: #fdf0f4;
  --text: #1a0a10;
  --text-muted: #8a6070;
  --accent: #c94070;
  --accent2: #f2a7bf;
  --accent3: #e8d5b0;
  --border: #f0d8e0;
  --shadow: 0 4px 24px rgba(180,60,90,0.08);
  --shadow-hover: 0 12px 40px rgba(180,60,90,0.18);
  --radius: 16px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.dark {
  --bg: #0f0a0d;
  --bg2: #1a0f14;
  --surface: #1e1218;
  --surface2: #251519;
  --text: #f8eef2;
  --text-muted: #a07888;
  --accent: #e86090;
  --accent2: #5a2035;
  --accent3: #3a2a18;
  --border: #3a1f28;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-hover: 0 12px 40px rgba(200,40,80,0.25);
}

/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background var(--transition), color var(--transition);
  min-height: 100vh;
}

/* ─── Header ─── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: background var(--transition), border-color var(--transition);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-size: 18px;
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--accent);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* ─── Theme Toggle ─── */
.theme-btn {
  width: 44px;
  height: 24px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  position: relative;
  transition: var(--transition);
  padding: 0;
}

.theme-btn::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  transition: transform var(--transition);
}

.dark .theme-btn::after {
  transform: translateX(20px);
}

/* ─── Cart Trigger ─── */
.cart-trigger {
  background: var(--accent);
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 999px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: var(--transition);
  box-shadow: 0 2px 12px rgba(201,64,112,0.3);
}

.cart-trigger:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(201,64,112,0.4);
}

.cart-count-badge {
  background: white;
  color: var(--accent);
  border-radius: 999px;
  padding: 1px 7px;
  font-size: 12px;
  font-weight: 700;
  min-width: 20px;
  text-align: center;
  transition: transform 0.2s;
}

.cart-count-badge.bump {
  animation: bump 0.3s ease;
}

@keyframes bump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.5); }
  100% { transform: scale(1); }
}

/* ─── Nav / Filters ─── */
nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 20px 32px 0;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 9px 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  border-radius: 999px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: var(--transition);
  letter-spacing: 0.3px;
}

.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--surface2);
}

.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  box-shadow: 0 2px 12px rgba(201,64,112,0.25);
}

/* ─── Search ─── */
.search-wrap {
  padding: 20px 32px;
  display: flex;
  justify-content: center;
}

.search-inner {
  position: relative;
  width: 100%;
  max-width: 480px;
}

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 16px;
}

#search {
  width: 100%;
  padding: 12px 16px 12px 44px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 999px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: var(--transition);
}

#search::placeholder { color: var(--text-muted); }

#search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,64,112,0.1);
}

/* ─── Product Grid ─── */
.grid-header {
  padding: 0 32px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.grid-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}

.grid-title span {
  color: var(--accent);
  font-style: italic;
}

.result-count {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
}

#products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  padding: 0 32px 120px;
}

/* ─── Product Card ─── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: var(--transition);
  animation: fadeIn 0.4s ease both;
  cursor: default;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
  border-color: var(--accent2);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-img-wrap {
  position: relative;
  height: 180px;
  overflow: hidden;
  background: var(--surface2);
}

.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.card:hover .card-img-wrap img {
  transform: scale(1.07);
}

.card-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--accent);
  color: white;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.card-body {
  padding: 14px 16px 16px;
}

.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text);
  line-height: 1.3;
}

.card-category {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  font-weight: 500;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.3px;
}

.card-price span {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  margin-right: 2px;
}

.add-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--accent);
  width: 34px;
  height: 34px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  display: grid;
  place-items: center;
  transition: var(--transition);
  flex-shrink: 0;
  line-height: 1;
}

.add-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  transform: scale(1.1);
  box-shadow: 0 2px 10px rgba(201,64,112,0.3);
}

.add-btn:active { transform: scale(0.95); }

/* ─── Empty State ─── */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state .emoji { font-size: 48px; margin-bottom: 12px; display: block; }
.empty-state p { font-size: 15px; }

/* ─── Cart Drawer ─── */
.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,4,7,0.4);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
  backdrop-filter: blur(2px);
}

.cart-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.cart-drawer {
  position: fixed;
  top: 0;
  right: 0;
  height: 100%;
  width: 360px;
  max-width: 95vw;
  background: var(--bg);
  z-index: 201;
  transform: translateX(100%);
  transition: transform var(--transition);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.cart-drawer.open {
  transform: translateX(0);
  box-shadow: -8px 0 40px rgba(0,0,0,0.2);
}

.cart-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.cart-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
}

.close-btn {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  display: grid;
  place-items: center;
  transition: var(--transition);
}

.close-btn:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
}

.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  animation: slideIn 0.3s ease both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

.cart-item-name {
  flex: 1;
  font-weight: 500;
  font-size: 14px;
}

.cart-item-qty {
  font-size: 13px;
  color: var(--text-muted);
  background: var(--surface2);
  padding: 3px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
}

.cart-item-price {
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
  min-width: 55px;
  text-align: right;
}

.remove-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 16px;
  transition: color 0.2s, transform 0.2s;
  padding: 4px;
  display: grid;
  place-items: center;
  border-radius: 6px;
}

.remove-btn:hover {
  color: #e84060;
  transform: scale(1.2);
  background: rgba(232,64,96,0.08);
}

.cart-empty {
  text-align: center;
  padding: 48px 0;
  color: var(--text-muted);
}

.cart-empty .emoji { font-size: 40px; display: block; margin-bottom: 10px; }

/* ─── Cart Footer ─── */
.cart-footer {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.cart-summary {
  margin-bottom: 16px;
}

.cart-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.cart-row.total-row {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  padding-top: 10px;
  border-top: 1px solid var(--border);
  margin-top: 6px;
}

.cart-row.total-row .amount {
  color: var(--accent);
  font-size: 22px;
}

.discount-strip {
  background: linear-gradient(90deg, rgba(201,64,112,0.1), rgba(201,64,112,0.05));
  border: 1px dashed var(--accent2);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  cursor: pointer;
  transition: var(--transition);
}

.discount-strip:hover { background: rgba(201,64,112,0.12); }

.discount-strip.applied {
  background: rgba(40,180,100,0.08);
  border-color: #40c070;
}

.discount-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
}

.discount-strip.applied .discount-label {
  color: #30a060;
}

.checkout-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), #a02050);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: var(--transition);
  box-shadow: 0 4px 20px rgba(201,64,112,0.35);
}

.checkout-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(201,64,112,0.45);
}

.checkout-btn:active { transform: translateY(0); }

/* ─── Responsive ─── */
@media (max-width: 640px) {
  header { padding: 0 16px; }
  nav { padding: 16px 16px 0; gap: 6px; }
  .search-wrap { padding: 14px 16px; }
  .grid-header { padding: 0 16px 12px; }
  #products { padding: 0 16px 120px; gap: 14px; }
  .grid-title { font-size: 22px; }
  .logo-text { font-size: 18px; }
  .cart-trigger span.label { display: none; }
}

/* ─── Product Images (placeholder SVGs per category) ─── */
.img-makeup    { background: linear-gradient(135deg, #fde0e8, #fbb6cc); }
.img-skincare  { background: linear-gradient(135deg, #e8f5e0, #bce8a8); }
.img-accessories { background: linear-gradient(135deg, #e8e0f5, #c8b4e8); }

.img-icon {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  opacity: 0.7;
}

</style>
</head>

<body class="light">

<!-- ─── Header ─── -->
<header>
  <div class="logo">
    <div class="logo-icon">🌸</div>
    <span class="logo-text">Beauty Nest</span>
  </div>
  <div class="header-right">
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark mode"></button>
    <button class="cart-trigger" onclick="openCart()">
      🛒 <span class="label">Cart</span>
      <span class="cart-count-badge" id="cartBadge">0</span>
    </button>
  </div>
</header>

<!-- ─── Filters ─── -->
<nav>
  <button class="filter-btn active" onclick="filter('all', this)">✦ All</button>
  <button class="filter-btn" onclick="filter('makeup', this)">💄 Makeup</button>
  <button class="filter-btn" onclick="filter('skincare', this)">🧴 Skincare</button>
  <button class="filter-btn" onclick="filter('accessories', this)">👜 Accessories</button>
</nav>

<!-- ─── Search ─── -->
<div class="search-wrap">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search products…" oninput="searchProduct()">
  </div>
</div>

<!-- ─── Grid Header ─── -->
<div class="grid-header">
  <h2 class="grid-title">Our <span>Collection</span></h2>
  <span class="result-count" id="resultCount"></span>
</div>

<!-- ─── Products ─── -->
<div id="products"></div>

<!-- ─── Cart Overlay & Drawer ─── -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<aside class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h3 class="cart-title">Your Cart 🛒</h3>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>

  <div class="cart-items" id="cartItems"></div>

  <div class="cart-footer">
    <div class="cart-summary">
      <div class="cart-row">
        <span>Subtotal</span>
        <span>₹<span id="subtotalAmt">0</span></span>
      </div>
      <div class="cart-row" id="discountRow" style="display:none; color: #40a060;">
        <span>Discount (10%)</span>
        <span>−₹<span id="discountAmt">0</span></span>
      </div>
      <div class="cart-row total-row">
        <span>Total</span>
        <span class="amount">₹<span id="total">0</span></span>
      </div>
    </div>

    <div class="discount-strip" id="discountStrip" onclick="applyDiscount()">
      <div class="discount-label">🏷 <span id="discountLabel">Apply 10% Discount</span></div>
      <span style="font-size:12px; color: var(--text-muted)" id="discountArrow">Tap →</span>
    </div>

    <button class="checkout-btn" onclick="checkout()">Checkout →</button>
  </div>
</aside>

<script>

/* ─── Data ─── */
const products = [
  { name: "Velvet Lipstick",   price: 300, category: "makeup",      emoji: "💋" },
  { name: "Silk Foundation",   price: 500, category: "makeup",      emoji: "✨" },
  { name: "Glow Blush",        price: 420, category: "makeup",      emoji: "🌸" },
  { name: "Eye Palette",       price: 650, category: "makeup",      emoji: "🎨" },
  { name: "Rose Face Wash",    price: 200, category: "skincare",    emoji: "🌹" },
  { name: "Hydra Moisturizer", price: 350, category: "skincare",    emoji: "💧" },
  { name: "Vitamin C Serum",   price: 780, category: "skincare",    emoji: "🍊" },
  { name: "Clay Face Mask",    price: 290, category: "skincare",    emoji: "🧖" },
  { name: "Pearl Handbag",     price: 1000,category: "accessories", emoji: "👜" },
  { name: "Cat-Eye Sunglasses",price: 600, category: "accessories", emoji: "🕶" },
  { name: "Gold Hair Clip",    price: 180, category: "accessories", emoji: "✂️" },
  { name: "Silk Scrunchie",    price: 120, category: "accessories", emoji: "🎀" },
];

let cart        = [];
let discounted  = false;
let currentData = [...products];

/* ─── Render ─── */
function show(data) {
  currentData = data;
  const box = document.getElementById("products");
  const rc  = document.getElementById("resultCount");
  rc.textContent = `${data.length} item${data.length !== 1 ? 's' : ''}`;

  if (!data.length) {
    box.innerHTML = `<div class="empty-state"><span class="emoji">🔎</span><p>No products found.</p></div>`;
    return;
  }

  box.innerHTML = data.map((p, i) => `
    <div class="card" style="animation-delay:${i * 0.05}s">
      <div class="card-img-wrap img-${p.category}">
        <div class="img-icon">${p.emoji}</div>
        <span class="card-badge">${p.category}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-category">${p.category}</div>
        <div class="card-footer">
          <div class="card-price"><span>₹</span>${p.price}</div>
          <button class="add-btn" onclick="add(${products.indexOf(p)})" title="Add to cart">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

/* ─── Filter ─── */
function filter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const result = cat === 'all' ? products : products.filter(p => p.category === cat);
  document.getElementById("search").value = "";
  show(result);
}

/* ─── Search ─── */
function searchProduct() {
  const val = document.getElementById("search").value.toLowerCase().trim();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-btn')[0].classList.add('active');
  show(val ? products.filter(p => p.name.toLowerCase().includes(val)) : products);
}

/* ─── Cart ─── */
function add(i) {
  const found = cart.find(c => c.name === products[i].name);
  found ? found.qty++ : cart.push({ ...products[i], qty: 1 });
  discounted = false;
  updateCartUI();
  updateBadge();
  bumpBadge();
}

function removeItem(i) {
  cart.splice(i, 1);
  discounted = false;
  updateCartUI();
  updateBadge();
}

function updateCartUI() {
  const list = document.getElementById("cartItems");
  if (!cart.length) {
    list.innerHTML = `<div class="cart-empty"><span class="emoji">🛍</span><p>Your cart is empty.</p></div>`;
    document.getElementById("subtotalAmt").textContent = 0;
    document.getElementById("total").textContent = 0;
    document.getElementById("discountRow").style.display = "none";
    return;
  }

  const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const total    = discounted ? Math.floor(subtotal * 0.9) : subtotal;
  const discount = subtotal - total;

  list.innerHTML = cart.map((c, idx) => `
    <div class="cart-item">
      <span style="font-size:22px">${c.emoji}</span>
      <div>
        <div class="cart-item-name">${c.name}</div>
        <div class="cart-item-price"><span style="font-size:11px;color:var(--text-muted)">₹</span>${c.price * c.qty}</div>
      </div>
      <span class="cart-item-qty">×${c.qty}</span>
      <button class="remove-btn" onclick="removeItem(${idx})" title="Remove">✕</button>
    </div>
  `).join('');

  document.getElementById("subtotalAmt").textContent = subtotal;
  document.getElementById("total").textContent = total;

  if (discounted) {
    document.getElementById("discountRow").style.display = "flex";
    document.getElementById("discountAmt").textContent = discount;
  } else {
    document.getElementById("discountRow").style.display = "none";
  }
}

function applyDiscount() {
  if (!cart.length) return;
  if (discounted) return;
  discounted = true;
  updateCartUI();

  const strip = document.getElementById("discountStrip");
  strip.classList.add("applied");
  document.getElementById("discountLabel").textContent = "10% Discount Applied!";
  document.getElementById("discountArrow").textContent = "✓";
}

function openCart()  {
  document.getElementById("cartDrawer").classList.add("open");
  document.getElementById("cartOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
  updateCartUI();
}

function closeCart() {
  document.getElementById("cartDrawer").classList.remove("open");
  document.getElementById("cartOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

function updateBadge() {
  const total = cart.reduce((s, c) => s + c.qty, 0);
  document.getElementById("cartBadge").textContent = total;
}

function bumpBadge() {
  const badge = document.getElementById("cartBadge");
  badge.classList.remove("bump");
  void badge.offsetWidth;
  badge.classList.add("bump");
}

function checkout() {
  if (!cart.length) { alert("Your cart is empty!"); return; }
  alert(`🎉 Order placed! Total: ₹${document.getElementById("total").textContent}. Thank you for shopping at Beauty Nest!`);
  cart = [];
  discounted = false;
  const strip = document.getElementById("discountStrip");
  strip.classList.remove("applied");
  document.getElementById("discountLabel").textContent = "Apply 10% Discount";
  document.getElementById("discountArrow").textContent = "Tap →";
  updateCartUI();
  updateBadge();
  closeCart();
}

/* ─── Theme ─── */
function toggleTheme() {
  document.body.classList.toggle("dark");
}

/* ─── Init ─── */
show(products);

</script>
</body>
